events {}

http {
    server {
        listen 80;
        server_name morinscode.dev;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            proxy_pass http://landing:80;
        }
    }

    server {
        listen 80;
        server_name scoundrels.morinscode.dev;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            proxy_pass http://scoundrels-frontend:80;
        }
    }
}